<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Spotify Stats | RBV Utility</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="dark">
  <div class="bg-circles" aria-hidden="true"><div class="circle circle1"></div><div class="circle circle2"></div></div>

  <header class="banner">
    <span class="logo">R<span style="color: #6c63ff;">²</span>Utility</span>
    <nav class="topnav"><a href="home.html">Dashboard</a></nav>
  </header>

  <main class="container">
    <h1>Tu Top Musical</h1>
    <p class="subtitle">Estadísticas en tiempo real de tu cuenta de Spotify.</p>

    <div id="login-section">
      <button id="btn-spotify-login" class="btn-glow" style="background-color: #1db954;">
        Conectar con Spotify
      </button>
    </div>

    <div id="loading-stats" style="display: none;">
      <p>Consultando a los satélites de Spotify...</p>
    </div>

<div id="stats-results" style="display: none; text-align: center;">
    <nav class="stats-nav" style="margin-bottom: 1rem;">
        <button onclick="updateType('artists')" class="btn-small">Artistas</button>
        <button onclick="updateType('tracks')" class="btn-small">Canciones</button>
    </nav>

    <div class="time-selector" style="margin-bottom: 2rem;">
        <button onclick="updateTime('short_term')" class="btn-mini">Último Mes</button>
        <button onclick="updateTime('medium_term')" class="btn-mini">6 Meses</button>
        <button onclick="updateTime('long_term')" class="btn-mini">Histórico</button>
    </div>

    <h2 id="stats-title" style="color: #6c63ff; margin-bottom: 0.5rem;">Tus Artistas Top</h2>
    <p style="font-size: 0.7rem; color: #888; margin-bottom: 2rem; font-style: italic;">
        * Nota: Los datos son proporcionados por la API de Spotify y pueden variar según el algoritmo de actualización.
    </p>
    
    <div id="stats-grid" class="feature-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 2rem;">
    </div>
</div>

  </main>

  <script src="script.js"></script>
</body>
</html>
