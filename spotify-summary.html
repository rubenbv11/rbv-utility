<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Spotify Stats | RBV Utility</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="dark">
  <div class="bg-circles" aria-hidden="true"><div class="circle circle1"></div><div class="circle circle2"></div></div>

  <header class="banner">
    <span class="logo">R<span style="color: #6c63ff;">²</span>Utility</span>
    <nav class="topnav"><a href="home.html">Dashboard</a></nav>
  </header>

  <main class="container">
    <h1>Tu Top Musical</h1>
    <p class="subtitle">Estadísticas en tiempo real de tu cuenta de Spotify.</p>

    <div id="login-section">
      <button id="btn-spotify-login" class="btn-glow" style="background-color: #1db954;">
        Conectar con Spotify
      </button>
    </div>

    <div id="loading-stats" style="display: none;">
      <p>Consultando a los satélites de Spotify...</p>
    </div>

   <div id="stats-results" style="display: none; text-align: left;">
      <nav class="stats-nav" style="display: flex; gap: 1rem; margin-bottom: 2rem; justify-content: center;">
        <button onclick="changeTab('artists')" class="btn-small">Artistas</button>
        <button onclick="changeTab('tracks')" class="btn-small">Canciones</button>
      </nav>

      <h2 id="stats-title" style="margin-bottom: 2rem; color: #6c63ff;">Tus Artistas Top</h2>
      
      <div id="stats-grid" class="feature-grid">
        </div>
    </div>

  </main>

  <script src="script.js"></script>
</body>
</html>
