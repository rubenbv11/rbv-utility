<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Error 404 - ¡Te has perdido! | RBV Utility</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .game-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: 2rem;
    }
    canvas {
      background: #111827;
      border: 4px solid #6c63ff;
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(108, 99, 255, 0.4);
      cursor: none;
    }
    .score-board {
      font-size: 2rem;
      font-weight: 800;
      color: #6c63ff;
      margin-bottom: 1rem;
    }
  </style>
</head>
<body class="min-h-screen flex flex-col dark">
  
  <div class="bg-circles" aria-hidden="true">
    <div class="circle circle1"></div>
    <div class="circle circle2"></div>
    <div class="circle circle3"></div>
  </div>

  <main class="container flex-grow" style="margin-top: 3rem;" role="main">
    <h1 style="font-size: 4rem;">404</h1>
    <p class="subtitle">Vaya... Parece que te has perdido en el servidor.<br>Échate una partida de Pong mientras encuentras el camino.</p>

    <div class="game-container">
      <div class="score-board">Tú: <span id="playerScore">0</span> | Servidor: <span id="aiScore">0</span></div>
      <canvas id="pongCanvas" width="600" height="400"></canvas>
      
      <a href="home.html" class="btn-glow" style="margin-top: 2rem; text-decoration: none;">Volver a la Base</a>
    </div>
  </main>

  <div class="custom-cursor"></div>
  <script src="script.js"></script>
  
  <script>
    const canvas = document.getElementById("pongCanvas");
    const ctx = canvas.getContext("2d");
    
    // Variables del juego
    let playerScore = 0, aiScore = 0;
    const paddleWidth = 10, paddleHeight = 80;
    let playerY = (canvas.height - paddleHeight) / 2;
    let aiY = (canvas.height - paddleHeight) / 2;
    let ballX = canvas.width / 2, ballY = canvas.height / 2;
    let ballSpeedX = 5, ballSpeedY = 5;

    // Mover tu pala con el ratón
    canvas.addEventListener("mousemove", (e) => {
      let rect = canvas.getBoundingClientRect();
      playerY = e.clientY - rect.top - paddleHeight / 2;
    });

    function update() {
      // Mover la bola
      ballX += ballSpeedX;
      ballY += ballSpeedY;

      // Rebote arriba y abajo
      if (ballY <= 0 || ballY >= canvas.height) ballSpeedY = -ballSpeedY;

      // IA básica (Sigue la bola)
      aiY += (ballY - (aiY + paddleHeight / 2)) * 0.1;

      // Colisión pala jugador
      if (ballX <= paddleWidth && ballY > playerY && ballY < playerY + paddleHeight) {
        ballSpeedX = -ballSpeedX;
        let deltaY = ballY - (playerY + paddleHeight / 2);
        ballSpeedY = deltaY * 0.2;
      }

      // Colisión pala IA
      if (ballX >= canvas.width - paddleWidth && ballY > aiY && ballY < aiY + paddleHeight) {
        ballSpeedX = -ballSpeedX;
      }

      // Puntos
      if (ballX < 0) { aiScore++; resetBall(); }
      if (ballX > canvas.width) { playerScore++; resetBall(); }

      document.getElementById("playerScore").innerText = playerScore;
      document.getElementById("aiScore").innerText = aiScore;
    }

    function resetBall() {
      ballX = canvas.width / 2;
      ballY = canvas.height / 2;
      ballSpeedX = -ballSpeedX;
      ballSpeedY = 5;
    }

    function draw() {
      // Limpiar canvas
      ctx.fillStyle = "#111827";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      // Dibujar red
      ctx.fillStyle = "rgba(255, 255, 255, 0.2)";
      for (let i = 0; i < canvas.height; i += 40) ctx.fillRect(canvas.width / 2 - 1, i, 2, 20);

      // Palas y bola
      ctx.fillStyle = "#6c63ff";
      ctx.fillRect(0, playerY, paddleWidth, paddleHeight); // Jugador
      ctx.fillRect(canvas.width - paddleWidth, aiY, paddleWidth, paddleHeight); // IA
      
      ctx.fillStyle = "#FCD53F";
      ctx.beginPath();
      ctx.arc(ballX, ballY, 8, 0, Math.PI * 2);
      ctx.fill();
    }

    function loop() {
      update();
      draw();
      requestAnimationFrame(loop);
    }
    loop();
  </script>
</body>
</html>
